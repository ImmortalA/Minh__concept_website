# Build static export and publish to GitHub Pages.
#
# First-time setup (required or deploy fails with HTTP 404):
# 1. GitHub repo → Settings → Pages
# 2. Under "Build and deployment", set Source to: GitHub Actions
# 3. If GitHub shows suggested workflows, pick "Static HTML" or browse workflows
#    and ensure this workflow is allowed to deploy (re-run after saving).
#
# Docs: https://docs.github.com/en/pages/getting-started-with-github-pages/configuring-a-publishing-source-for-your-github-pages-site

name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Compute BASE_PATH
        id: base
        shell: bash
        run: |
          NAME="${{ github.event.repository.name }}"
          OWNER="${{ github.repository_owner }}"
          if [ "$NAME" = "$OWNER.github.io" ]; then
            echo "path=" >> "$GITHUB_OUTPUT"
            echo "Publishing at root (user/org site)."
          else
            echo "path=/$NAME" >> "$GITHUB_OUTPUT"
            echo "Publishing under /$NAME (project site)."
          fi

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        env:
          BASE_PATH: ${{ steps.base.outputs.path }}
        run: npm run build:pages

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
